version: "3.8"
services:
  # Base de datos para Evolution API
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evolution_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Cache para Evolution API
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  # Evolution API v1 — Gateway de WhatsApp (QR estable)
  evolution:
    image: atendai/evolution-api:v1.8.7
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-elara-secret-key}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - DATABASE_ENABLED=false
      - REDIS_ENABLED=false
      - STORE_MESSAGES=true
      - STORE_MESSAGE_UP=true
      - STORE_CONTACTS=true
      - STORE_CHATS=true
      - DEL_INSTANCE=false
      - WEBHOOK_GLOBAL_ENABLED=false
      - CONFIG_SESSION_PHONE_CLIENT=Elara
      - CONFIG_SESSION_PHONE_NAME=Chrome
      - QRCODE_LIMIT=30
    volumes:
      - evolution_data:/evolution/instances
    restart: unless-stopped

  # Elara — Secretaria Virtual del Sr. Gerson
  elara:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./knowledge:/app/knowledge
      - ./config:/app/config
    depends_on:
      - evolution
    restart: unless-stopped

volumes:
  postgres_data:
