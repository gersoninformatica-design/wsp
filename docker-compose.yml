version: "3.8"
services:
  # Base de datos para Evolution API
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: evolution
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evolution_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Cache para Evolution API
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  # Evolution API — Gateway de WhatsApp (open source)
  evolution:
    image: atendai/evolution-api:v2.1.1
    ports:
      - "8080:8080"
    environment:
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:${POSTGRES_PASSWORD:-evolution_secret}@postgres:5432/evolution
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-elara-secret-key}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # Elara — Secretaria Virtual del Sr. Gerson
  elara:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./knowledge:/app/knowledge
      - ./config:/app/config
    depends_on:
      - evolution
    restart: unless-stopped

volumes:
  postgres_data:
