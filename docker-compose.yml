version: "3.8"
services:
  # Evolution API v1 — Gateway de WhatsApp (QR estable, sin DB externa)
  evolution:
    image: atendai/evolution-api:v2.2.3
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-elara-secret-key}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:elara_db_2026@postgres:5432/evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379
      - CACHE_REDIS_PREFIX_KEY=evolution
      - DEL_INSTANCE=false
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=http://elara:8000/webhook
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_CONTACTS_UPSERT=true
      - WEBHOOK_EVENTS_CONTACTS_UPDATE=true
      - WEBHOOK_EVENTS_CHATS_UPSERT=true
      - CONFIG_SESSION_PHONE_CLIENT=Elara
      - CONFIG_SESSION_PHONE_NAME=Chrome
      - QRCODE_LIMIT=30
    volumes:
      - evolution_data:/evolution/instances
    restart: unless-stopped

  # Elara — Secretaria Virtual del Sr. Gerson
  elara:
    build: .
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      - ./knowledge:/app/knowledge
      - ./config:/app/config
    restart: unless-stopped

volumes:
  evolution_data:
